name: CI

on: [push,pull_request]

jobs:
  tests:
    name: "Python ${{ matrix.python-version }}"
    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash -el {0}

    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest] #macos-latest/macos-14 is M1 - some deps
        python-version: ["3.9", "3.13"]

    steps:
      - uses: "actions/checkout@v3"
        with:
          fetch-depth: 0

      # Setup env
      - uses: "conda-incubator/setup-miniconda@v3"
        with:
          activate-environment: pharokka_env
          environment-file: environment.yml
          python-version: ${{ matrix.python-version }}
          auto-activate-base: false
          channels: conda-forge,bioconda,defaults
          channel-priority: strict
          auto-update-conda: true

      - name: Install pip
        run: conda install -n pharokka_env pip -y

      - name: Install test deps
        run: pip install pytest pytest-cov

      - name: Install pharokka
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Enable subprocess coverage tracking
        # test_overall.py and test_proteins.py run `pharokka run` via
        # subprocess.Popen, so coverage.py can't see them without this.
        # Writing sitecustomize.py to site-packages makes every new Python
        # subprocess call coverage.process_startup(), which checks for the
        # COVERAGE_PROCESS_START env var and starts measuring if set.
        run: |
          python - <<'EOF'
          import site, os
          for p in site.getsitepackages():
              if os.path.isdir(p):
                  sc = os.path.join(p, "sitecustomize.py")
                  with open(sc, "w") as f:
                      f.write("try:\n    import coverage; coverage.process_startup()\nexcept ImportError:\n    pass\n")
                  print(f"Wrote subprocess coverage hook to {sc}")
                  break
          EOF

      - name: Run tests and collect coverage
        # Use 'python -m pytest' rather than bare 'pytest': the bare pytest
        # script adds bin/ to sys.path[0], which causes bin/pharokka.py (the
        # legacy backward-compat entry point) to shadow the pharokka package
        # and produces "pharokka is not a package" on every test import.
        # python -m sets sys.path[0] to the project root instead.
        #
        # COVERAGE_PROCESS_START tells coverage.process_startup() (called by
        # sitecustomize.py in each subprocess) which config file to use.
        env:
          COVERAGE_PROCESS_START: pyproject.toml
        run: python -m pytest --cov=src/pharokka --cov-report=xml

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v3
        with:
          version: v0.7.3
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
