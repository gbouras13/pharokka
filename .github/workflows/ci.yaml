name: CI

on: [push,pull_request]

jobs:
  tests:
    name: "Python ${{ matrix.python-version }}"
    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash -el {0}

    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest] #macos-latest/macos-14 is M1 - some deps
        python-version: ["3.9", "3.13"]

    steps:
      - uses: "actions/checkout@v3"
        with:
          fetch-depth: 0

      # Setup env
      - uses: "conda-incubator/setup-miniconda@v3"
        with:
          activate-environment: pharokka_env
          environment-file: environment.yml
          python-version: ${{ matrix.python-version }}
          auto-activate-base: false
          channels: conda-forge,bioconda,defaults
          channel-priority: strict
          auto-update-conda: true
      - name: Install pip
        run: conda install -n pharokka_env pip -y
      - name: Install test deps
        run: |
          pip install pytest pytest-cov
      - name: Install pharokka
        shell: bash -l {0}
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Run tests and collect coverage
        # Use 'python -m pytest' rather than bare 'pytest': the bare pytest
        # script adds bin/ to sys.path[0], which causes bin/pharokka.py (the
        # legacy backward-compat entry point) to shadow the pharokka package
        # and produces "pharokka is not a package" on every test import.
        # python -m sets sys.path[0] to the project root instead.
        run: python -m pytest --cov=src/pharokka --cov-report=xml
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v3
        with:
          version: v0.7.3
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
