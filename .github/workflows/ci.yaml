name: CI

on: [push, pull_request]

jobs:
  lint:
    name: "Lint & format (ruff)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.8.3
        with:
          pixi-version: v0.71.2
          cache: true
          environments: lint

      - name: Check formatting and lint
        run: pixi run -e lint check-fmt

  tests:
    name: "Tests (${{ matrix.os }}, ${{ matrix.environment }})"
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest] # macos-latest is arm64 (M1)
        environment: [py39, py313]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.8.3
        with:
          pixi-version: v0.71.2
          cache: true
          environments: ${{ matrix.environment }}

      - name: Enable subprocess coverage tracking
        # test_overall.py and test_proteins.py run `pharokka run` via
        # subprocess.Popen, so coverage.py can't see them without this.
        # Writing sitecustomize.py into the pixi environment's site-packages
        # makes every new Python subprocess call coverage.process_startup(),
        # which checks for the COVERAGE_PROCESS_START env var (set by the
        # test-ci pixi task) and starts measuring if present.
        run: |
          pixi run -e ${{ matrix.environment }} python - <<'EOF'
          import site, os
          for p in site.getsitepackages():
              if os.path.isdir(p):
                  sc = os.path.join(p, "sitecustomize.py")
                  with open(sc, "w") as f:
                      f.write("try:\n    import coverage; coverage.process_startup()\nexcept ImportError:\n    pass\n")
                  print(f"Wrote subprocess coverage hook to {sc}")
                  break
          EOF

      - name: Run tests and collect coverage
        # Golden-output regression tests (marked `golden`) run several full
        # pharokka pipelines and diff key outputs against committed reference
        # files.  They only need to run on ONE matrix cell to catch regressions
        # — running them on all four would quadruple the heavy work for no extra
        # signal.  So they run only on ubuntu-latest + py313 (the reference
        # platform the golden files were generated against) via test-ci-golden;
        # every other cell uses test-ci, which excludes them.
        run: |
          if [[ "${{ matrix.os }}" == "ubuntu-latest" && "${{ matrix.environment }}" == "py313" ]]; then
            pixi run -e py313 test-ci-golden
          else
            pixi run -e ${{ matrix.environment }} test-ci
          fi

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v3
        with:
          version: v0.7.3
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
